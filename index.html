<section id="contact" class="py-24 bg-white">
    <div class="max-w-3xl mx-auto px-8">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-black text-slate-900 uppercase tracking-tighter mb-4">Ready to Scale?</h2>
            <p class="text-slate-500">Not sure where to start? Drop me a message and let's discuss your organic growth strategy.</p>
        </div>

        <form action="https://formspree.io/f/your-id" method="POST" class="grid grid-cols-1 gap-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Name *</label>
                <input type="text" name="name" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:border-[#14B8A6] transition">
            </div>
            
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Company *</label>
                    <input type="text" name="company" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:border-[#14B8A6] transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Email *</label>
                    <input type="email" name="email" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:border-[#14B8A6] transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Message (Optional)</label>
                <textarea name="message" rows="4" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 focus:outline-none focus:border-[#14B8A6] transition"></textarea>
            </div>

            <button type="submit" class="w-full bg-slate-900 text-white font-bold uppercase tracking-widest py-4 rounded-lg hover:bg-[#14B8A6] transition-colors duration-300">
                Send Message
            </button>
        </form>
    </div>
</section>

<footer class="py-12 border-t border-slate-100 text-center">
    <p class="text-slate-400 text-sm font-medium">© 2026 Hawk Marketing. All rights reserved.</p>
</footer>
